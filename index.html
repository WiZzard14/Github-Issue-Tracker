<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind and DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./styles/style.css">
</head>
<body class="bg-[#f3f3f3]">
    
    <header class="bg-[#ececec] border-b border-gray-300">
        <nav class="max-w-[1366px] mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center px-2 py-1 gap-2">
                <img src="./assets/github-logo.png" alt="Logo" class="w-8 h-8 object-contain">
                <h1 class="text-[20px] font-bold text-[#1f2937]">
                    GitHub Issues Tracker
                </h1>
            </div>

            <div class="flex items-center gap-2">
    
                <div class="flex items-center bg-[#f5f6f7] border border-gray-300 rounded-lg px-3 h-[44px] w-[320px]">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 mr-2"></i>
                    <input type="text" placeholder="Search issues..." class="w-full bg-transparent outline-none border-none text-gray-600 placeholder:text-gray-400"/>
                </div>

                <button class="h-[44px] px-6 bg-[#4f46e5] text-white font-semibold rounded-md">+ New Issue</button>
            </div>
        </nav>
    </header>

    <script src="./script/index.js"></script>
</body>
</body>
</html>
