<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind and DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./styles/style.css">
</head>
<body class="bg-[#f3f3f3] min-h-screen">

    <section id="loginSection" class="min-h-screen flex items-center justify-center px-4 py-10 bg-[#f3f4f6]">
        <div class="w-full max-w-[520px] bg-[#f8f8f8] rounded-2xl shadow-md border border-gray-200 px-8 py-10">
            
            <div class="text-center mb-8">
                <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-28 h-28 mx-auto mb-6 object-contain">
                <h1 class="text-[28px] font-bold text-[#2d3748] leading-tight">GitHub Issues Tracker</h1>
                <p class="text-[16px] text-[#718096] mt-1">Sign in to manage your issues</p>
            </div>

            <div class="mb-4">
                <label for="usernameInput" class="block text-[16px] font-semibold text-[#2d3748] mb-3">Username</label>
                <input id="usernameInput" type="text" placeholder="Enter Username" class="w-full h-[56px] px-4 rounded-xl border border-gray-300 bg-[#f8f8f8] text-[16px] text-gray-700 outline-none">
                <p class="text-[#3b00ff] text-[14px] mt-2">Default: admin</p>
            </div>

            <div class="mb-6">
                <label for="passwordInput" class="block text-[16px] font-semibold text-[#2d3748] mb-3">Password</label>
                <input id="passwordInput" type="password" placeholder="Enter Password" class="w-full h-[56px] px-4 rounded-xl border border-gray-300 bg-[#f8f8f8] text-[16px] text-gray-700 outline-none">
                <p class="text-[#3b00ff] text-[14px] mt-2">Default: admin123</p>
            </div>

            <button id="loginBtn" class="w-full h-[52px] rounded-xl text-white text-[16px] font-semibold bg-gradient-to-r from-[#4d00ff] to-[#5b19ff] border-none">Sign In</button>

            <div class="flex items-center gap-4 my-8">
                <div class="flex-1 h-[1px] bg-gray-300"></div>
                <span class="text-[#2d3748] text-[16px]">OR</span>
                <div class="flex-1 h-[1px] bg-gray-300"></div>
            </div>

            <div class="text-center">
                <p class="text-[16px] text-[#718096] mb-4">Demo Credentials:</p>

                <div class="bg-[#eef0f2] rounded-xl py-6 px-4">
                    <p class="text-[18px] text-[#2d3748]">
                        <span class="font-bold">Username:</span> admin
                    </p>
                    <p class="text-[18px] text-[#2d3748]">
                        <span class="font-bold">Password:</span> admin123
                    </p>
                </div>
            </div>

        </div>
    </section>

    <section id="mainSection" class="hidden">
        <header class="bg-[#ececec] border-b border-gray-300 sticky top-0 z-10">
            <nav class="max-w-[1366px] mx-auto px-6 py-3 flex items-center justify-between md:flex-row flex-col gap-4">
                <div class="flex items-center px-2 py-1 gap-2">
                    <img src="./assets/github-logo.png" alt="Logo" class="w-8 h-8 object-contain">
                    <h1 class="text-[20px] font-bold text-[#1f2937]">GitHub Issues Tracker</h1>
                </div>

                <div class="flex items-center gap-2 md:flex-row flex-col">
                    <div class="flex items-center bg-[#f5f6f7] border border-gray-300 rounded-lg px-3 h-[44px] w-[320px]">
                        <i class="fa-solid fa-magnifying-glass text-gray-400 mr-2"></i>
                        <input id="search-input" type="text" placeholder="Search issues..." class="w-full bg-transparent outline-none border-none text-gray-600 placeholder:text-gray-400"/>
                    </div>

                    <button class="h-[44px] px-6 bg-[#4f46e5] text-white font-semibold rounded-md">+ New Issue</button>
                </div>
            </nav>
        </header>

        <main class="w-11/12 max-w-[1100px] mx-auto my-10">

            <div class="bg-[#f8f8f8] border border-gray-200 rounded-md p-4 mb-4">
                <div class="flex gap-3">
                    <button id="all-btn" onclick="showAllIssues()" class="btn btn-sm bg-[#4f1eff] text-white border-none">
                        All
                    </button>

                    <button id="open-btn" onclick="showOpenIssues()" class="btn btn-sm bg-white text-gray-500 border border-gray-200">
                        Open
                    </button>

                    <button id="closed-btn" onclick="showClosedIssues()" class="btn btn-sm bg-white text-gray-500 border border-gray-200">
                        Closed
                    </button>
                </div>
            </div>

            <div class="bg-[#f8f8f8] border border-gray-200 rounded-md px-5 py-4 flex items-center justify-between">

                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-[#ede9fe] flex items-center justify-center">
                        <img src="./assets/Aperture.png" alt="">
                    </div>

                    <div>
                        <h2 id="issue-count" class="text-[18px] font-semibold text-[#1f2937] leading-none">0 Issues</h2>
                        <p class="text-[11px] text-gray-400 mt-1">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center gap-4 text-[12px]">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span>
                        <span class="text-gray-700">Open</span>
                    </div>

                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-purple-500 inline-block"></span>
                        <span class="text-gray-700">Closed</span>
                    </div>
                </div>

            </div>

            <div id="loader" class="text-center py-10 hidden">
                <span class="loading loading-spinner loading-lg text-primary"></span>
            </div>

            <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mt-4"></div>
        </main>
    </section>

    <dialog id="issue_modal" class="modal">
        <div class="modal-box max-w-[700px] rounded-2xl p-7">
            <h3 id="modal-title" class="text-[22px] font-bold text-[#1f2937] mb-3"></h3>

            <div class="flex items-center gap-3 text-sm text-gray-500 mb-5">
                <span id="modal-status" class="px-3 py-1 rounded-full bg-green-600 text-white text-xs font-medium"></span>
                <span>•</span>
                <span id="modal-author"></span>
                <span>•</span>
                <span id="modal-date"></span>
            </div>

            <div id="modal-labels" class="flex flex-wrap gap-2 mb-5"></div>

            <p id="modal-description" class="text-[15px] text-gray-500 leading-7 mb-6"></p>

            <div class="grid grid-cols-2 gap-5 bg-[#f3f4f6] rounded-xl p-5 mb-6">
                <div>
                    <p class="text-gray-500 mb-2">Assignee:</p>
                    <h4 id="modal-assignee" class="text-[18px] font-semibold text-[#1f2937]"></h4>
                </div>

                <div>
                    <p class="text-gray-500 mb-2">Priority:</p>
                    <span id="modal-priority" class="inline-block px-4 py-1 rounded-full text-white text-sm font-medium"></span>
                </div>
            </div>

            <div class="modal-action">
                <form method="dialog">
                    <button class="btn bg-[#4f1eff] text-white border-none px-6">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="./scripts/index.js"></script>
</body>
</html>
